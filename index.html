<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Strudel Playground</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
  {
    "imports": {
      "codemirror": "https://esm.sh/codemirror@6.0.2",
      "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript@6.2.5",
      "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6.1.3",
      "@codemirror/state": "https://esm.sh/@codemirror/state@6.6.0",
      "@codemirror/view": "https://esm.sh/@codemirror/view@6.41.0",
      "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.8.1",
      "@codemirror/language": "https://esm.sh/@codemirror/language@6.10.8",
      "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6.18.6",
      "@strudel/core": "https://esm.sh/@strudel/core@1.2.6",
      "@strudel/webaudio": "https://esm.sh/@strudel/webaudio@1.3.0?external=@strudel/core",
      "@strudel/transpiler": "https://esm.sh/@strudel/transpiler@1.2.6?external=@strudel/core",
      "@strudel/mini": "https://esm.sh/@strudel/mini@1.2.6?external=@strudel/core",
      "@strudel/tonal": "https://esm.sh/@strudel/tonal@1.2.6?external=@strudel/core",
      "@strudel/soundfonts": "https://esm.sh/@strudel/soundfonts@1.3.0?external=@strudel/core,@strudel/webaudio&bundle-deps"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <aside id="sidebar" tabindex="-1">
      <div id="sidebar-header">
        <h2>Songs</h2>
        <button id="edit-btn" title="Edit current song">Edit</button>
      </div>
      <input id="song-filter" type="text" placeholder="Filter (regex)" />
      <ul id="song-list" tabindex="0"></ul>
      <div id="mobile-editor" style="display:none"></div>
      <div id="sidebar-footer">
        <div id="sidebar-left">
          <button id="play-btn" title="Play / Pause">
            <span id="play-icon">&#9654;</span>
          </button>
        </div>
        <button id="about-btn" title="About this project">About</button>
      </div>
    </aside>
    <main id="main">
      <div id="pattern-display"></div>
      <div id="editor"></div>
      <div id="diff-view" style="display:none"></div>
      <div id="toolbar">
        <button id="apply-btn" title="Apply changes">Apply</button>
        <button id="diff-btn" title="Show diff">Diff</button>
        <button id="revert-btn" title="Revert to original">Revert</button>
        <span id="status">Stopped</span>
        <input id="progress" type="range" min="0" max="1000" value="0" />
        <span id="elapsed">0:00</span>
      </div>
    </main>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
